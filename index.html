<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bok2 Brasil - Links Oficiais</title>
    <meta name="description"
        content="Acesse todos os links oficiais da Bok2 Brasil: WhatsApp, Site Principal, Livraria e nossa Calculadora de Custos de Impressão.">

    <!-- Google Fonts: Outfit para Títulos e Inter para Textos -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;700;800&display=swap"
        rel="stylesheet">

    <!-- FontAwesome para ícones modernos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Estilos Customizados -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Preloader de carregamento premium -->
    <div id="preloader">
        <div class="loader-logo-wrapper">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 80" class="bok2-logo-loader">
                <g transform="translate(10, 10)">
                    <!-- Ícone de 4 folhas empilhadas em perspectiva -->
                    <path class="draw-path path-4" d="M 40,15 L 65,15 L 65,40 L 40,40 Z" fill="none" stroke="#FFFFFF"
                        stroke-width="4.5" stroke-linejoin="round" opacity="0.4" />
                    <path class="draw-path path-3" d="M 30,22 L 55,22 L 55,47 L 30,47 Z" fill="none" stroke="#FFFFFF"
                        stroke-width="4.5" stroke-linejoin="round" opacity="0.6" />
                    <path class="draw-path path-2" d="M 20,29 L 45,29 L 45,54 L 20,54 Z" fill="none" stroke="#FFFFFF"
                        stroke-width="4.5" stroke-linejoin="round" opacity="0.8" />
                    <path class="draw-path path-1" d="M 10,36 L 35,36 L 35,61 L 10,61 Z" fill="none" stroke="#FFFFFF"
                        stroke-width="4.5" stroke-linejoin="round" />
                </g>
                <text class="text-bok2" x="95" y="55" font-family="'Outfit', sans-serif" font-size="44"
                    font-weight="700" fill="#FFFFFF" letter-spacing="-1">
                    bok<tspan fill="#F25222">2</tspan>
                </text>
            </svg>
        </div>
    </div>

    <!-- Fundo dinâmico com gradientes animados suaves (Mesh Gradient style) -->
    <div class="bg-glow-1"></div>
    <div class="bg-glow-2"></div>
    <div class="bg-glow-3"></div>

    <div class="container">
        <!-- Cabeçalho / Perfil -->
        <header class="profile-header">
            <!-- Logo Circular SVG (Fiel à imagem) -->
            <div class="logo-wrapper">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" class="bok2-logo-circular">
                    <circle cx="100" cy="100" r="96" fill="#000000" />
                    <g transform="translate(15, 60) scale(0.78)">
                        <g transform="translate(10, 10)">
                            <path d="M 40,15 L 65,15 L 65,40 L 40,40 Z" fill="none" stroke="#FFFFFF" stroke-width="4.5"
                                stroke-linejoin="round" opacity="0.4" />
                            <path d="M 30,22 L 55,22 L 55,47 L 30,47 Z" fill="none" stroke="#FFFFFF" stroke-width="4.5"
                                stroke-linejoin="round" opacity="0.6" />
                            <path d="M 20,29 L 45,29 L 45,54 L 20,54 Z" fill="none" stroke="#FFFFFF" stroke-width="4.5"
                                stroke-linejoin="round" opacity="0.8" />
                            <path d="M 10,36 L 35,36 L 35,61 L 10,61 Z" fill="none" stroke="#FFFFFF" stroke-width="4.5"
                                stroke-linejoin="round" />
                        </g>
                        <text x="95" y="55" font-family="'Outfit', sans-serif" font-size="44" font-weight="700"
                            fill="#FFFFFF" letter-spacing="-1">
                            bok<tspan fill="#F25222">2</tspan>
                        </text>
                    </g>
                </svg>
            </div>

            <h1 class="profile-name"></h1>
            <p class="profile-subtitle">Acesse nossas Páginas</p>
        </header>

        <!-- Container de Links (Estilo Pílula da Imagem) -->
        <main class="links-container">
            <!-- Link: WhatsApp Bok2 -->
            <a href="https://wa.me/5511971137243" target="_blank" rel="noopener" class="link-card" id="link-whatsapp">
                WHATSAPP BOK2
            </a>

            <!-- Link: Calculadora e Orçamentos -->
            <a href="https://www.bok2.com.br/#calculadora" target="_blank" rel="noopener" class="link-card"
                id="link-calculator">
                CALCULADORA E ORÇAMENTOS
            </a>

            <!-- Link: Site Principal -->
            <a href="https://www.bok2.com.br" target="_blank" rel="noopener" class="link-card" id="link-website">
                SITE PRINCIPAL
            </a>

            <!-- Link: Livraria da Bok2 -->
            <a href="https://www.livrariadabok2.com.br" target="_blank" rel="noopener" class="link-card"
                id="link-bookstore">
                LIVRARIA DA BOK2
            </a>
        </main>
        <!-- Bio de descrição abaixo dos botões -->
        <p class="profile-bio-bottom">Sua plataforma de impressão sob demanda. Publique e venda seus livros sem tiragem
            mínima e sem estoque.
        </p>
    </div>

    <!-- Barra laranja horizontal na base da página -->
    <div class="bottom-bar"></div>

    <!-- Script premium para Preloader, Efeito 3D Tilt e Glow Tracking -->
    <script>
        // Gerenciamento do Preloader
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                const preloader = document.getElementById('preloader');
                if (preloader) {
                    preloader.classList.add('fade-out');
                    document.body.classList.add('loaded');
                    setTimeout(() => {
                        preloader.remove();
                    }, 600);
                }
            }, 1400); // Garante que a animação estilosa do logo seja vista
        });

        // Efeito de Inclinação 3D (Tilt) e Brilho Dinâmico
        document.querySelectorAll('.link-card').forEach(card => {
            card.addEventListener('mousemove', e => {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;

                // Propriedades customizadas para a posição do mouse no gradiente radial
                card.style.setProperty('--mouse-x', `${x}px`);
                card.style.setProperty('--mouse-y', `${y}px`);

                // Cálculo para inclinação 3D
                const width = rect.width;
                const height = rect.height;
                const centerX = width / 2;
                const centerY = height / 2;

                const maxTilt = 8; // Grau máximo de inclinação
                const tiltX = ((y - centerY) / centerY) * -maxTilt;
                const tiltY = ((x - centerX) / centerX) * maxTilt;

                card.style.transform = `perspective(1000px) rotateX(${tiltX}deg) rotateY(${tiltY}deg) translateY(-5px) scale3d(1.02, 1.02, 1.02)`;
            });

            card.addEventListener('mouseleave', () => {
                card.style.transform = '';
            });
        });
    </script>
</body>

</html>
